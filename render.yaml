services:
  - type: web
    name: transactiq-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: LOCAL_DB_PATH
        value: /tmp/transactiq.db
      - key: MODEL_DIR
        value: /tmp/models
      - key: TRANSACTIQ_API_KEY
        sync: false
      - key: TRANSACTIQ_ADMIN_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
